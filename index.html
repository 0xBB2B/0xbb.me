<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', "monospace"],
              cyber: ['"Orbitron"', "sans-serif"],
            },
            colors: {
              neon: {
                pink: "#ff4fd8",
                cyan: "#42f8ff",
                purple: "#8b5cf6",
                violet: "#5f36ff",
                yellow: "#f8ff72",
                bg: "#05040b",
                panel: "#100c1f",
                ink: "#15102a",
              },
            },
            animation: {
              "pulse-fast": "pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              glitch: "glitch 1s linear infinite",
              scanline: "scanline 8s linear infinite",
              "pixel-drift": "pixel-drift 12s linear infinite",
              "hud-blink": "hud-blink 1.7s steps(2, end) infinite",
            },
            keyframes: {
              glitch: {
                "2%, 64%": { transform: "translate(3px,0) skew(0deg)" },
                "4%, 60%": { transform: "translate(-3px,0) skew(0deg)" },
                "62%": { transform: "translate(0,0) skew(7deg)" },
              },
              scanline: {
                "0%": { transform: "translateY(-100%)" },
                "100%": { transform: "translateY(100%)" },
              },
              "pixel-drift": {
                "0%": { transform: "translate3d(0,0,0)" },
                "100%": { transform: "translate3d(-48px,48px,0)" },
              },
              "hud-blink": {
                "0%, 75%": { opacity: "1" },
                "76%, 100%": { opacity: "0.28" },
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Webkit 滚动条样式 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border: 1px solid #00ffff;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #00ffff;
      }
      body {
        background-color: #05040b;
        color: #e0e0e0;
        overflow-x: hidden;
      }
      body::selection {
        background: #ff4fd8;
        color: #05040b;
      }
      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.25) 50%
          ),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      .pixel-corners {
        clip-path: polygon(0 12px, 12px 12px, 12px 0, calc(100% - 12px) 0, calc(100% - 12px) 12px, 100% 12px, 100% calc(100% - 12px), calc(100% - 12px) calc(100% - 12px), calc(100% - 12px) 100%, 12px 100%, 12px calc(100% - 12px), 0 calc(100% - 12px));
      }
      .text-level {
        text-shadow: 0 0 18px rgba(66, 248, 255, 0.9), 2px 0 rgba(255, 79, 216, 0.8), -2px 0 rgba(139, 92, 246, 0.7);
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
