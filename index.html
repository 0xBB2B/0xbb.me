<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"JetBrains Mono"', "monospace"],
              cyber: ['"Orbitron"', "sans-serif"],
            },
            colors: {
              // 银狼 LV.999 「阿哈时刻」配色：紫罗兰 / 品红粉 / 像素青。
              neon: {
                pink: "#ff4fd8",
                cyan: "#66e0ff",
                purple: "#9b7bff",
                violet: "#7a4dff",
                yellow: "#f8ff72",
                bg: "#06031a",
                panel: "#120a2a",
                ink: "#15102a",
              },
            },
            animation: {
              "pulse-fast": "pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              glitch: "glitch 1s linear infinite",
              scanline: "scanline 8s linear infinite",
              "pixel-drift": "pixel-drift 12s linear infinite",
              "hud-blink": "hud-blink 1.7s steps(2, end) infinite",
            },
            keyframes: {
              glitch: {
                "2%, 64%": { transform: "translate(3px,0) skew(0deg)" },
                "4%, 60%": { transform: "translate(-3px,0) skew(0deg)" },
                "62%": { transform: "translate(0,0) skew(7deg)" },
              },
              scanline: {
                "0%": { transform: "translateY(-100%)" },
                "100%": { transform: "translateY(100%)" },
              },
              "pixel-drift": {
                "0%": { transform: "translate3d(0,0,0)" },
                "100%": { transform: "translate3d(-48px,48px,0)" },
              },
              "hud-blink": {
                "0%, 75%": { opacity: "1" },
                "76%, 100%": { opacity: "0.28" },
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Webkit 滚动条样式 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a1f55;
        border: 1px solid #9b7bff;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9b7bff;
      }
      body {
        background-color: #06031a;
        color: #e0e0e0;
        overflow-x: hidden;
      }
      body::selection {
        background: #ff4fd8;
        color: #06031a;
      }
      .crt::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
            rgba(18, 16, 16, 0) 50%,
            rgba(0, 0, 0, 0.25) 50%
          ),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.06),
            rgba(0, 255, 0, 0.02),
            rgba(0, 0, 255, 0.06)
          );
        z-index: 50;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
      }
      .text-level {
        text-shadow: 0 0 18px rgba(102, 224, 255, 0.85), 2px 0 rgba(255, 79, 216, 0.85), -2px 0 rgba(155, 123, 255, 0.85);
      }
      /* 银狼像素游戏机外框：用 SVG 描出像素切角与扫描带感。 */
      .pixel-frame {
        clip-path: polygon(
          0 12px, 12px 0, calc(100% - 12px) 0, 100% 12px,
          100% calc(100% - 12px), calc(100% - 12px) 100%,
          12px 100%, 0 calc(100% - 12px)
        );
      }
      @keyframes aha-flicker {
        0%, 92%, 100% { opacity: 0.9; }
        93% { opacity: 0.4; }
        95% { opacity: 0.85; }
      }
      .animate-aha-flicker {
        animation: aha-flicker 4.2s steps(8, end) infinite;
      }
      /* LV.999 全连特效：从极小快速爆出，轻微回弹后落定。 */
      @keyframes lv999-pop {
        0%   { transform: scale(0.35) rotate(-6deg); opacity: 0; filter: blur(8px); }
        25%  { transform: scale(1.25) rotate(3deg);  opacity: 1; filter: blur(0);   }
        45%  { transform: scale(0.92) rotate(-1deg); opacity: 1; filter: blur(0);   }
        65%  { transform: scale(1.08) rotate(0.5deg); opacity: 1; filter: blur(0);  }
        100% { transform: scale(1) rotate(0deg);     opacity: 1; filter: blur(0);   }
      }
      .animate-lv999-pop { animation: lv999-pop 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }
      /* LV.999 同步抖动的故障描边——每帧 step 跳变制造像素位移。 */
      @keyframes lv999-glitch {
        0%, 100% { transform: translate(0, 0); }
        20%      { transform: translate(2px, -1px); }
        40%      { transform: translate(-3px, 2px); }
        60%      { transform: translate(2px, 1px); }
        80%      { transform: translate(-2px, -2px); }
      }
      .animate-lv999-glitch { animation: lv999-glitch 0.18s steps(4, end) infinite; }
      /* 横向扫描线快速划过 LV.999 文本，模拟 CRT 扫描频闪。 */
      @keyframes lv999-sweep {
        0%   { transform: translateY(-120%); opacity: 0; }
        20%  { opacity: 1; }
        100% { transform: translateY(120%); opacity: 0; }
      }
      .animate-lv999-sweep { animation: lv999-sweep 1.6s linear infinite; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
